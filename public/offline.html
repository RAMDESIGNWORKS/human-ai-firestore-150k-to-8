<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Not Connected — Executive Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060d18;
      color: #e8edf5;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 320px; }
    .icon {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: #0d1220;
      border: 1px solid #1e2a3a;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 24px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #f0f4ff; }
    p { font-size: 14px; color: #4a5568; line-height: 1.6; margin-bottom: 24px; }
    button {
      padding: 13px 28px;
      background: #2a5280;
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>No Connection</h1>
    <p>The EA needs a network connection to reach the board. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
